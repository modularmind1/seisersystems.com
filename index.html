<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seiser Systems | Coming Soon</title>
  <meta name="description" content="Seiser Systems builds custom PCs, workstations, and engineered technology solutions with honest recommendations.">
  <style>
    :root {
      --bg: #05070a;
      --panel: #0d1117;
      --text: #f4f7fb;
      --muted: #a9b4c2;
      --accent: #1477ff;
      --accent-soft: rgba(20, 119, 255, 0.22);
      --border: rgba(255,255,255,0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 15%, rgba(20,119,255,0.18), transparent 32rem),
        linear-gradient(180deg, #080b10 0%, var(--bg) 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      text-align: center;
      background: rgba(13, 17, 23, 0.82);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: clamp(28px, 6vw, 56px);
      box-shadow: 0 0 48px rgba(20, 119, 255, 0.16);
      backdrop-filter: blur(10px);
    }

    img {
      width: min(260px, 78vw);
      height: auto;
      border-radius: 18px;
      margin-bottom: 28px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 8vw, 4.5rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      line-height: 0.95;
    }

    .subtitle {
      margin: 16px auto 0;
      max-width: 570px;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.18rem);
      line-height: 1.55;
    }

    .badge {
      display: inline-block;
      margin: 28px 0 22px;
      padding: 8px 14px;
      border: 1px solid var(--accent-soft);
      border-radius: 999px;
      color: #cfe2ff;
      background: var(--accent-soft);
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .contact {
      display: grid;
      gap: 12px;
      margin: 28px auto 0;
      max-width: 420px;
    }

    a {
      color: var(--text);
      text-decoration: none;
    }

    .button {
      display: block;
      padding: 14px 18px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .button:hover {
      transform: translateY(-1px);
      border-color: rgba(20,119,255,0.55);
      background: rgba(20,119,255,0.14);
    }

    footer {
      margin-top: 32px;
      color: #768294;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <main>
    <img src="seiser-systems-logo.png" alt="Seiser Systems logo">
    <h1>Coming Soon</h1>
    <p class="subtitle">
      Seiser Systems is building custom PCs, workstations, and engineered technology solutions with honest recommendations and quality-first support.
    </p>

    <div class="badge">Engineered Solutions • Honest Advice</div>

    <div class="contact">
      <a class="button" href="mailto:contact@seisersystems.com">contact@seisersystems.com</a>
      <a class="button" href="tel:+1(517)-260-4759">Phone</a>
      <a class="button" href="https://www.instagram.com/seisersystems">Instagram</a>
      <a class="button" href="https://www.facebook.com/profile.php?id=61591903915805">Facebook</a>
    </div>

    <footer>
      © 2026 Seiser Systems. Built right. Built to last.
    </footer>
  </main>
</body>
</html>
